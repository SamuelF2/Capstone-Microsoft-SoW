name: cocoon
metadata:
  template: cocoon-template

services:
  api:
    project: ./backend
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .

  web:
    project: ./frontend
    language: js
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .

  neo4j:
    project: ./
    host: containerapp
    image: neo4j:5-community
    docker:
      path: ./Dockerfile.neo4j
      context: .

  postgres:
    project: ./
    host: containerapp
    image: postgres:16-alpine
    docker:
      path: ./Dockerfile.postgres
      context: .

hooks:
  postprovision:
    shell: sh
    run: echo "Infrastructure provisioned. Review outputs in .azure/ before deploying."
    interactive: true
    continueOnError: true
