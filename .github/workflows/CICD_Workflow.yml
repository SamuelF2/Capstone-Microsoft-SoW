name: Basic ci/cd
run-name: ${{ github.actor }} is pushing changes to main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint-and-unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install uv
        run: pip install uv

      - name: Install pre-commit
        run: uv tool install pre-commit

      - name: Run pre-commit hooks (auto-fix)
        run: pre-commit run --all-files || true

      - name: Commit lint fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix lint/format [skip ci]"

      - name: Verify lint is clean
        run: pre-commit run --all-files

      - name: Backend Unit Tests
        run: |
          cd backend
          uv pip install -r requirements.txt --system
          pytest -m "not integration" -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

  azure-deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v1.0.0

      # Need to add azure login stuff here, might need to implement github secrets for this :(

      # And then add azure deployment stuff here too
